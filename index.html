<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wondr</title>

    <link rel="stylesheet" href="css/index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@simonwep/pickr/dist/themes/nano.min.css"/>

</head>
<body>
    
    <div id="mainBox">
        <div class="headerUI"></div>
        <div id="bodyUI">
            <div id="toolbox">
                <div id="toolCanvas" class="tool"><img src="icons/canvas.svg"></div>
                <div id="toolUpload" class="tool"><img src="icons/upload.svg"></div>
                <div id="toolSticker" class="tool"><img src="icons/sticker.svg"></div>
                <div id="toolText" class="tool"><img src="icons/text.svg"></div>
                <div id="toolSocials" class="tool"><img src="icons/socials.svg"></div>
                <div id="toolExport" class="tool"><img src="icons/export.svg"></div>
            </div>
            <div id="toolmenu">
                <div id="menuCanvas">
                    
                    <div class="pnlBox" id="pnlBackground">
                        
                        <div class="pnlEntry">
                            <div class="btnReset"><img src="buttons/btnReset.svg"></div>
                            <div id="dropBackground" class="dropdown">
                           
                                <h2>Background</h2>
                                <img src="buttons/btnArrow.svg">
                                
                                <div id="selectBackground" class="dropOption">
                                    <div class="optBG">Solid Color</div>
                                    <div class="optBG">Gradient Color</div>
                                    <div class="optBG">Upload Image</div>
                                </div>
                                
                            </div>
                    
                        </div>

                        <div id="configBackground">
                            
                        </div>
                    </div>
                    <div class="breakLine"></div>
                   
                </div>
            </div>
            <div id="workArea">
                <canvas id="mainCanvas" width="1080" height="1080"></canvas>
            </div>
            
            <div class="border"></div>
        </div>
        <div class="footer"></div>
    </div>
    <div id="adsBox">
        <div class="headerUI"></div>
        <div id="bodyAd">
            <div class="border"></div>
            <div class="ads"></div>
            <div class="border"></div>
        </div>
        <div class="footer"></div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@simonwep/pickr/dist/pickr.min.js"></script>
    <script src="js/index.js"></script>
</body>
</html>
